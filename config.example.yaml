# Meeting-Minutes config — copy to `config.yaml` and edit.
# `config.yaml` is git-ignored, so your personal settings stay private.

you:
  name: "Your Name"
  email: "you@example.com"      # used to recognise you in the attendee list
  org: "Your Company"           # appears in the minutes prompt (the "our side")

paths:
  # (1) Local folder where your meeting audio lands (download from Drive, AirDrop, etc.)
  audio_dir: "~/MeetingAudio"
  # (4) Where minutes are written. A sub-folder is auto-created PER ACCOUNT.
  output_dir: "~/MeetingMinutes"

# (4) Accounts/clients. Filename keywords map a recording to an account, which
# becomes its output sub-folder. Add your own. Unmatched -> "_Uncategorized".
accounts:
  - name: "AcmeCorp"
    keywords: ["acme"]
  - name: "Globex"
    keywords: ["globex", "环球"]      # keywords can be in any language
  - name: "Initech"
    keywords: ["initech"]

# ── Engine: pick ONE ─────────────────────────────────────────────────────────
#   notebooklm — PREFERRED. Free, no API key, handles long audio. NotebookLM does
#                BOTH transcription and the minutes. Needs the notebooklm-py CLI +
#                a Google login. (Audio is uploaded to Google.)
#   local      — Whisper-turbo transcribes ON YOUR MACHINE, then YOUR chosen LLM
#                writes the minutes. Private transcription; you bring an LLM key.
#   cloud      — (advanced) Gemini API transcribes, then your LLM summarises.
backend: "notebooklm"

notebooklm:                        # backend: notebooklm
  # Path to the notebooklm-py CLI binary, and the notebook to upload into.
  binary: "~/.local/share/notebooklm/.venv/bin/notebooklm"
  notebook_id: "your-notebook-id-here"

local:                             # backend: local
  whisper_model: "large-v3-turbo"   # turbo (recommended) | large-v3 | medium | small

cloud:                             # backend: cloud (advanced)
  model: "gemini-2.5-flash"         # GEMINI_API_KEY in env

# The LLM that WRITES the minutes for the `local` and `cloud` backends.
# Provider-agnostic via LiteLLM — set the model and put the matching API key in your
# environment. Examples (model -> required env var):
#   gpt-4o                       -> OPENAI_API_KEY
#   claude-3-7-sonnet-latest     -> ANTHROPIC_API_KEY
#   gemini/gemini-2.5-flash      -> GEMINI_API_KEY
#   ollama/qwen2.5:14b           -> (local Ollama, no key)
llm:
  model: "gpt-4o"

crosscheck:
  # (2) Use your own past minutes for the same account to correct transcription
  # typos (names, products, jargon). Reads prior .md files from output_dir/<account>/.
  enabled: true
  max_prior: 3                      # how many recent prior minutes to learn terms from
